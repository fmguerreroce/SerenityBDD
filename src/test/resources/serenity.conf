serenity {
    take.screenshots = FOR_FAILURES
    restart.browser.for.each = feature
}

headless.mode = true
webdriver {
  driver = chrome
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "--start-maximized"
      ,  "incognito","disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
        "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"]
    }
  }
}
serenity {
  logging = VERBOSE
  step.delay = 0
}

cucumber {
  publish.enabled = false
}
environments {

  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }

  dev {
    webdriver.base.url = "https://dev.midominio.com"
  }

  qa {
    webdriver.base.url = "https://qa.midominio.com"
  }

  prod {
    webdriver.base.url = "https://midominio.com"
  }

}